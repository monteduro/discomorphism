    <style>

      .audio-toggle::before {
        content: "";

        left: 50%;
        top: 50%;

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const ambientAudio = document.querySelector("#ambient-audio");
      const audioToggle = document.querySelector(".audio-toggle");

      const syncAudioButton = () => {
        const isPlaying = !ambientAudio.paused;
        audioToggle.classList.toggle("is-playing", isPlaying);
        audioToggle.setAttribute("aria-pressed", String(isPlaying));
        audioToggle.setAttribute("aria-label", isPlaying ? "Pause audio" : "Play audio");
      };

      const playAmbientAudio = async () => {
        try {
          await ambientAudio.play();
        } catch {
          syncAudioButton();
        }
      };

      audioToggle.addEventListener("click", async (event) => {
        event.stopPropagation();
        if (ambientAudio.paused) {
          await playAmbientAudio();
        } else {
          ambientAudio.pause();
        }
        syncAudioButton();
      });

      ["play", "pause", "ended"].forEach((eventName) => {
        ambientAudio.addEventListener(eventName, syncAudioButton);
      });

      syncAudioButton();
      playAmbientAudio();

      const stage = document.querySelector("#stage");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 100);

      const getInitialCameraDistance = () => {
        const frameSize = Math.min(Math.min(window.innerWidth, window.innerHeight) * 0.78, 720);
        const targetDiameter = frameSize * 0.92;
        const visualDiameter = 5.45;
        const verticalFit = (visualDiameter * window.innerHeight) / targetDiameter;
        const fovScale = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
        return Math.max(9.8, verticalFit / fovScale);
      };

      camera.position.set(0, 0.1, getInitialCameraDistance());

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.18;
      stage.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.065;
      controls.enablePan = false;
      controls.enableRotate = false;
      controls.minDistance = 6.4;
      controls.maxDistance = 22;
      controls.autoRotate = false;

      scene.add(new THREE.AmbientLight(0xffffff, 0.18));

      const keyLight = new THREE.SpotLight(0x22ff78, 58, 14, 0.48, 0.72, 1.05);
      keyLight.position.set(-3.9, 3.2, 4.4);
      scene.add(keyLight);

      const rimLight = new THREE.PointLight(0x00ff84, 42, 10);
      rimLight.position.set(3.5, 1.6, 2.9);
      scene.add(rimLight);

      const lowLight = new THREE.PointLight(0x1ed760, 26, 8);
      lowLight.position.set(-2.4, -2.8, 3.6);
      scene.add(lowLight);

      const whiteGlint = new THREE.PointLight(0xffffff, 8, 7);
      whiteGlint.position.set(-1.9, 1.2, 3.8);
      scene.add(whiteGlint);

      const backHalo = new THREE.PointLight(0x16ff7a, 54, 9);
      backHalo.position.set(0, 0.2, -3.4);
      scene.add(backHalo);

      const backLeft = new THREE.SpotLight(0x8dffc0, 24, 10, 0.55, 0.76, 1.2);
      backLeft.position.set(-2.8, 1.9, -3.2);
      backLeft.target.position.set(0, 0, 0);
      scene.add(backLeft, backLeft.target);

      const backRight = new THREE.SpotLight(0xffffff, 12, 9, 0.42, 0.82, 1.2);
      backRight.position.set(2.4, -1.7, -3.1);
      backRight.target.position.set(0.25, -0.1, 0);
      scene.add(backRight, backRight.target);

      const logo = new THREE.Group();
      scene.add(logo);

      const rotation = {
        x: -0.02,
        y: 0,
        vx: 0,
        vy: 0,
        dragging: false,
        pinching: false,
        userControlled: false,
        lastX: 0,
        lastY: 0,
        activePointers: new Map()
      };

      const stopAutoRotation = () => {
        rotation.userControlled = true;
      };

      renderer.domElement.addEventListener("pointerdown", (event) => {
        stopAutoRotation();
        rotation.activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (rotation.activePointers.size > 1) {
          rotation.dragging = false;
          rotation.pinching = true;
          rotation.vx = 0;
          rotation.vy = 0;
          return;
        }
        rotation.dragging = true;
        rotation.pinching = false;
        rotation.lastX = event.clientX;
        rotation.lastY = event.clientY;
        rotation.vx = 0;
        rotation.vy = 0;
        if (event.pointerType !== "touch") {
          renderer.domElement.setPointerCapture(event.pointerId);
        }
      });

      renderer.domElement.addEventListener("pointermove", (event) => {
        if (rotation.activePointers.has(event.pointerId)) {
          rotation.activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        }
        if (rotation.pinching || rotation.activePointers.size > 1 || !rotation.dragging) return;
        const dx = event.clientX - rotation.lastX;
        const dy = event.clientY - rotation.lastY;
        rotation.lastX = event.clientX;
        rotation.lastY = event.clientY;
        rotation.y += dx * 0.008;
        rotation.x += dy * 0.006;
        rotation.x = THREE.MathUtils.clamp(rotation.x, -0.58, 0.58);
        rotation.vy = dx * 0.0009;
        rotation.vx = dy * 0.0007;
      });

      const endDrag = (event) => {
        rotation.activePointers.delete(event.pointerId);
        rotation.dragging = false;
        rotation.pinching = rotation.activePointers.size > 1;
        rotation.vx = 0;
        rotation.vy = 0;
        if (rotation.activePointers.size === 1 && event.pointerType === "touch") {
          const remainingPointer = [...rotation.activePointers.values()][0];
          rotation.lastX = remainingPointer.x;
          rotation.lastY = remainingPointer.y;
        }
        if (renderer.domElement.hasPointerCapture(event.pointerId)) {
          renderer.domElement.releasePointerCapture(event.pointerId);
        }
      };

      renderer.domElement.addEventListener("pointerup", endDrag);
      renderer.domElement.addEventListener("pointercancel", endDrag);
      renderer.domElement.addEventListener("wheel", stopAutoRotation, { passive: true });
      renderer.domElement.addEventListener("touchstart", stopAutoRotation, { passive: true });

      const radius = 2.18;
      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(radius * 0.995, 96, 64),
        new THREE.MeshPhysicalMaterial({
          color: 0x050807,
          roughness: 0.38,
          metalness: 0.08,
          clearcoat: 0.9,
          clearcoatRoughness: 0.1,
          envMapIntensity: 1
        })
      );
      logo.add(shell);

      const tileMaterials = [
        new THREE.MeshPhysicalMaterial({ color: 0xd7dedb, metalness: 0.16, roughness: 0.02, transmission: 0.78, thickness: 0.42, ior: 1.58, clearcoat: 1, clearcoatRoughness: 0.02, transparent: true, opacity: 0.52, side: THREE.DoubleSide }),
        new THREE.MeshPhysicalMaterial({ color: 0xf5fff9, metalness: 0.08, roughness: 0.015, transmission: 0.86, thickness: 0.5, ior: 1.62, clearcoat: 1, clearcoatRoughness: 0.015, transparent: true, opacity: 0.6, side: THREE.DoubleSide }),
        new THREE.MeshPhysicalMaterial({ color: 0xaeb8b3, metalness: 0.24, roughness: 0.025, transmission: 0.68, thickness: 0.35, ior: 1.55, clearcoat: 1, clearcoatRoughness: 0.025, transparent: true, opacity: 0.46, side: THREE.DoubleSide }),
        new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.04, roughness: 0.008, transmission: 0.92, thickness: 0.56, ior: 1.66, clearcoat: 1, clearcoatRoughness: 0.01, transparent: true, opacity: 0.72, side: THREE.DoubleSide }),
        new THREE.MeshPhysicalMaterial({ color: 0x303735, metalness: 0.32, roughness: 0.035, transmission: 0.42, thickness: 0.28, ior: 1.5, clearcoat: 1, clearcoatRoughness: 0.03, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
      ];

      const sphericalPoint = (lat, lon, r) => {
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon + 90);
        return new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
      };

      const makeTile = (latA, latB, lonA, lonB, material) => {
        const insetLat = 0.06;
        const insetLon = 0.11;
        const positions = [
          sphericalPoint(latA + insetLat, lonA + insetLon, radius + 0.011),
          sphericalPoint(latA + insetLat, lonB - insetLon, radius + 0.011),
          sphericalPoint(latB - insetLat, lonB - insetLon, radius + 0.011),
          sphericalPoint(latB - insetLat, lonA + insetLon, radius + 0.011)
        ];
        const geometry = new THREE.BufferGeometry().setFromPoints(positions);
        geometry.setIndex([0, 1, 2, 0, 2, 3]);
        geometry.computeVertexNormals();
        return new THREE.Mesh(geometry, material);
      };

      for (let lat = -76; lat < 78; lat += 7) {
        const shift = Math.round((lat + 80) / 7) % 2 ? 3.6 : 0;
        for (let lon = -180 + shift; lon < 180 + shift; lon += 8.5) {
          const centerLon = lon + 4.25;
          const centerLat = lat + 3.5;
          const highlight = (centerLon > -145 && centerLon < -70 && centerLat > -34 && centerLat < 26) ||
            (centerLon > 24 && centerLon < 90 && centerLat > -7 && centerLat < 48) ||
            (centerLon > 90 && centerLon < 143 && centerLat > 18 && centerLat < 63);
          const shimmer = Math.sin(centerLon * 0.11 + centerLat * 0.33) + Math.cos(centerLon * 0.07 - centerLat * 0.18);
          let materialIndex = shimmer > 1.05 ? 2 : shimmer < -1.15 ? 0 : 1;
          if (highlight) materialIndex = shimmer > 0.2 ? 4 : 3;
          const tile = makeTile(lat, lat + 6.25, lon, lon + 7.55, tileMaterials[materialIndex]);
          logo.add(tile);
        }
      }

      const blackMaterial = new THREE.MeshPhysicalMaterial({
        color: 0x000000,
        roughness: 0.38,
        metalness: 0.08,
        clearcoat: 0.68,
        clearcoatRoughness: 0.18
      });

      const spotifyBands = new THREE.Group();
      spotifyBands.position.z = 2.18;
      logo.add(spotifyBands);

      const makeRibbon = ({ start, c1, c2, end, width }) => {
        const center = new THREE.CubicBezierCurve(
          new THREE.Vector2(...start),
          new THREE.Vector2(...c1),
          new THREE.Vector2(...c2),
          new THREE.Vector2(...end)
        );
        const samples = center.getPoints(74);
        const top = [];
        const bottom = [];

        for (let i = 0; i < samples.length; i++) {
          const prev = samples[Math.max(i - 1, 0)];
          const next = samples[Math.min(i + 1, samples.length - 1)];
          const tangent = next.clone().sub(prev).normalize();
          const normal = new THREE.Vector2(-tangent.y, tangent.x).multiplyScalar(width / 2);
          top.push(samples[i].clone().add(normal));
          bottom.push(samples[i].clone().sub(normal));
        }

        const shape = new THREE.Shape();
        shape.moveTo(top[0].x, top[0].y);
        top.slice(1).forEach((point) => shape.lineTo(point.x, point.y));

        const endPoint = samples[samples.length - 1];
        const endTangent = samples[samples.length - 1].clone().sub(samples[samples.length - 2]).normalize();
        const endNormal = new THREE.Vector2(-endTangent.y, endTangent.x);
        for (let step = 1; step <= 14; step++) {
          const angle = (Math.PI * step) / 14;
          const point = endPoint.clone()
            .add(endNormal.clone().multiplyScalar(Math.cos(angle) * width / 2))
            .add(endTangent.clone().multiplyScalar(Math.sin(angle) * width / 2));
          shape.lineTo(point.x, point.y);
        }

        bottom.slice().reverse().forEach((point) => shape.lineTo(point.x, point.y));

        const startPoint = samples[0];
        const startTangent = samples[1].clone().sub(samples[0]).normalize();
        const startNormal = new THREE.Vector2(-startTangent.y, startTangent.x);
        for (let step = 1; step <= 14; step++) {
          const angle = Math.PI + (Math.PI * step) / 14;
          const point = startPoint.clone()
            .add(startNormal.clone().multiplyScalar(Math.cos(angle) * width / 2))
            .add(startTangent.clone().multiplyScalar(Math.sin(angle) * width / 2));
          shape.lineTo(point.x, point.y);
        }
        shape.closePath();

        const mesh = new THREE.Mesh(
          new THREE.ExtrudeGeometry(shape, {
            depth: 0.16,
            bevelEnabled: true,
            bevelThickness: 0.035,
            bevelSize: 0.035,
            bevelSegments: 7,
            curveSegments: 18
          }),
          blackMaterial
        );
        mesh.position.z = -0.08;
        mesh.renderOrder = 5;
        spotifyBands.add(mesh);
        return mesh;
      };

      makeRibbon({
        start: [-1.5, 0.75],
        c1: [-0.55, 1.06],
        c2: [0.58, 0.91],
        end: [1.42, 0.45],
        width: 0.25
      });

      makeRibbon({
        start: [-1.28, 0.12],
        c1: [-0.45, 0.36],
        c2: [0.52, 0.2],
        end: [1.22, -0.22],
        width: 0.22
      });

      makeRibbon({
        start: [-1.02, -0.48],
        c1: [-0.35, -0.31],
        c2: [0.35, -0.45],
        end: [0.92, -0.75],
        width: 0.19
      });

      const glowRing = new THREE.Mesh(
        new THREE.SphereGeometry(radius * 1.012, 96, 64),
        new THREE.MeshBasicMaterial({
          color: 0x1ed760,
          transparent: true,
          opacity: 0.11,
          side: THREE.BackSide
        })
      );
      logo.add(glowRing);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.z = getInitialCameraDistance();
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();

      function animate() {
        const elapsed = clock.getElapsedTime();
        if (!rotation.dragging) {
          rotation.y += (rotation.userControlled ? 0 : 0.0012) + rotation.vy;
          rotation.x += rotation.vx;
          rotation.vx *= 0.9;
          rotation.vy *= 0.9;
          rotation.x *= 0.985;
          rotation.x = THREE.MathUtils.clamp(rotation.x, -0.58, 0.58);
        }
        logo.rotation.y = rotation.y + Math.sin(elapsed * 0.32) * 0.018;
        logo.rotation.x = rotation.x + Math.sin(elapsed * 0.24) * 0.012;
        logo.rotation.z = Math.sin(elapsed * 0.18) * 0.018;
        keyLight.position.x = -3.9 + Math.sin(elapsed * 0.72) * 0.9;
        rimLight.intensity = 38 + Math.sin(elapsed * 1.15) * 9;
        lowLight.intensity = 24 + Math.cos(elapsed * 0.95) * 5;
        backHalo.intensity = 49 + Math.sin(elapsed * 0.82) * 8;
        backLeft.intensity = 22 + Math.cos(elapsed * 0.68) * 5;
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
